name: pipx install

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  pipx-install:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install pipx
        run: |
          python -m pip install --upgrade pipx

      - name: Add pipx binary directory to PATH
        run: |
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Install Hylianscan with pipx
        run: |
          pipx install .
          which hylianscan
          hylianscan --help
